<!DOCTYPE html>
<html>
<head>
    <title>Wave System</title>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');
        
        :root {
            --primary-color: #438afc;
            --background-color: #141f525e;
            --border-color: #008cff0c;
            --accent-color: #0174ff;
            --foreground-color: hsl(200, 30%, 4%);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--foreground-color);
            font-family: 'Space Grotesk', monospace, sans-serif;
            color: #ddd;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 100vh;
        }

        h1 {
            color: var(--primary-color);
            margin: 0;
            letter-spacing: 0.1em;
        }

        main {
            flex: 1;
            display: flex;
            gap: 15px;
            min-height: 0;
            overflow: auto;
        }

        aside {
            width: 300px;
            flex-shrink: 0;
            background: linear-gradient(var(--background-color), #00000035);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            overflow-y: auto;
        }

        #VariablesConfig {
            display: grid;
            gap: 18px;
        }

        #VariablesConfig h2 {
            margin: 0 0 8px;
            font-size: 1.2rem;
            letter-spacing: 0.08em;
            color: #f5f9ff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            padding-bottom: 8px;
        }

        .control-group {
            display: grid;
            gap: 10px;
            padding: 12px 12px 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
        }

        .control-group label {
            display: block;
            color: #e5ecff;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .control-group input[type="range"],
        .control-group input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .control-group input[type="range"] {
            padding: 0;
            height: 22px;
        }

        .control-group input[type="number"] {
            max-width: 120px;
            appearance: textfield;
        }

        .control-group input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(1, 116, 255, 0.12);
            background: rgba(255, 255, 255, 0.12);
        }

        .number-pair {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        #canvas-container {
            flex: 1;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--foreground-color);
            overflow: hidden;
            position: relative;
            
            min-width: 0;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            display: block;
            border-radius: 10px;
            width: 100%;
            height: 100%;
        }

        @media (max-width: 1200px) {
            body {
                overflow: auto;
            }

            main {
                flex-direction: column;
                overflow: visible;
            }
            
            #canvas-container {
                height: auto;
                aspect-ratio: 16 / 9;
            }
            #canvas {
                width: 100%;
                height: 100%;
            }

            aside {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>Wave System</h1>

    <main>
        <aside class="rounded">
            <form action="" id="VariablesConfig">
                <h2>Variables</h2>
                
                <div class="control-group">
                    <label for="Amplitude">Amplitude</label>
                    <input type="range" id="Amplitude" name="amplitude" min="0" max="1" step="0.1" value=".3">
                </div>
                <div class="control-group">
                    <label for="Direction">Direction (x, z)</label>
                    <div class="number-pair">
                        <input type="number" name="directionx" id="directionx" min="0" max="1" step="0.05" value="0.6">
                        <input type="number" name="directionz" id="directionz" min="0" max="1" step="0.05" value="0.15">
                    </div>
                </div>
                <div class="control-group">
                    <label for="Steepness">Steepness</label>
                    <input type="range" id="Steepness" name="steepness" min="0" max="3" step="0.1" value="0.5">
                </div>
                <div class="control-group">
                    <label for="WaveLength">Wave Length</label>
                    <input type="range" id="WaveLength" name="wavelength" min="1" max="5" step=".2" value="5">
                </div>
                <div class="control-group">
                    <label for="AngularFrequency">Angular Frequency</label>
                    <input type="range" id="AngularFrequency" name="angular_frequency" min="0" max="5" step="0.2" value="3.2">
                </div>
                <div class="control-group">
                    <label for="Phase">Phase</label>
                    <input type="range" id="Phase" name="phase" min="-3" max="3" step="0.1" value="0">
                </div>
            </form>
        </aside>

        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <script src="index.js"></script>
    <script>
        const canvas = document.getElementById("canvas");
        window.GodotBridge = {
            ping: function() {
                console.log("Engine Connection Successful!");
                return "Pong from JS!";
            },

            setproperties: null,

            updateProperties: function(data) {
                if (this.setproperties) {
                    this.setproperties(data);
                } else {
                    console.warn("setproperties function not defined in GodotBridge.");
                }
            }
        };

        const variablesForm = document.getElementById("VariablesConfig");
        const inputs = variablesForm.querySelectorAll("input[type='range'], input[type='number']");

        inputs.forEach(input => {
            input.addEventListener("input", () => {
                const formData = new FormData(variablesForm);
                let data = Object.fromEntries(formData.entries());

                for (let key in data) {
                    data[key] = parseFloat(data[key]);
                }

                window.GodotBridge.updateProperties( JSON.stringify(data) );
            });
        });
        

        var engine = new Engine({"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":1277728,"index.wasm":35749181},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4});
        engine.startGame({
            canvas: canvas,                    
            canvasResizePolicy: 0,             
        }).then(() => {
            console.log("Engine loaded successfully!");

            resizeCanvas();

            window.addEventListener('resize', resizeCanvas);
        });

        function resizeCanvas() {
            const container = document.getElementById("canvas-container");

            const aspect = 16 / 9;

            let width = container.clientWidth;
            let height = container.clientHeight;

            if (height === 0) return; 

            if (width / height > aspect) {
                width = height * aspect;
            } else {
                height = width / aspect;
            }

            canvas.width = width;
            canvas.height = height;

            canvas.style.width = width + "px";
            canvas.style.height = height + "px";
        }
        
        
    </script>
</body>
</html>
