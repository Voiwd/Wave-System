<!DOCTYPE html>
<html>
<head>
    <title>Wave System</title>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');
        
        :root {
            --primary-color: #438afc;
            --background-color: rgba(52, 52, 52, 0.371);
            --border-color: #008cff0c;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            background-color: #0a0a0a;
            font-family: 'Space Grotesk', monospace, sans-serif;
            color: #ddd;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 100vh;
        }

        h1 {
            color: var(--primary-color);
            margin: 0;
            letter-spacing: 0.1em;
        }

        main {
            flex: 1;
            display: flex;
            gap: 15px;
            min-height: 0;
            overflow: auto;
        }

        aside {
            width: 300px;
            flex-shrink: 0;
            background-color: var(--background-color);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            overflow-y: auto;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }

        input[type="range"] {
            width: 100%;
        }

        #canvas-container {
            flex: 1;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: #111;
            overflow: hidden;
            position: relative;
            
            min-width: 0;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        @media (max-width: 1200px) {
            body {
                overflow: auto;
            }

            main {
                flex-direction: column;
                overflow: visible;
            }
            
            #canvas-container {
                height: auto;
                aspect-ratio: 16 / 9;
            }
            #canvas {
                width: 100%;
                height: 100%;
            }

            aside {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>Wave System</h1>

    <main>
        <aside class="rounded">
            <form action="" id="VariablesConfig">
                <h2>Variables</h2>
                
                <label for="Amplitude">
                    Amplitude <br> <input type="range" id="Amplitude" name="amplitude" min="0" max="1" step="0.1" value=".3">
                </label>
                <label for="Direction">
                    Direction (x, z) <br>
                    <input type="number" name="directionx" id="directionx" min="0" max="1" step="0.05" value="0.6">
                    <input type="number" name="directionz" id="directionz" min="0" max="1" step="0.05" value="0.15">
                </label>
                <label for="Steepness">
                    Steepness <br> <input type="range" id="Steepness" name="steepness" min="0" max="3" step="0.1" value="0.5">
                </label>
                <label for="Wave length">
                    Wave Length <br> <input type="range" id="WaveLength" name="wavelength" min="1" max="5" step=".2" value="5">
                </label>
                <label for="Angular frequency">
                    Angular Frequency <br> <input type="range" id="AngularFrequency" name="angular_frequency" min="0" max="5" step="0.2" value="3.2">
                </label>
                <label for="Phase">
                    Phase <br> <input type="range" id="Phase" name="phase" min="-3" max="3" step="0.1" value="0">
                </label>
            </form>
        </aside>

        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <script src="index.js"></script>
    <script>
        const canvas = document.getElementById("canvas");
        window.GodotBridge = {
            ping: function() {
                console.log("Engine Connection Successful!");
                return "Pong from JS!";
            },

            setproperties: null, // placeholder for Godot to override

            updateProperties: function(data) {
                if (this.setproperties) {
                    this.setproperties(data);
                } else {
                    console.warn("setproperties function not defined in GodotBridge.");
                }
            }
        };

        const variablesForm = document.getElementById("VariablesConfig");
        const inputs = variablesForm.querySelectorAll("input[type='range'], input[type='number']");

        inputs.forEach(input => {
            input.addEventListener("input", () => {
                const formData = new FormData(variablesForm);
                let data = Object.fromEntries(formData.entries());

                for (let key in data) {
                    data[key] = parseFloat(data[key]);
                }

                window.GodotBridge.updateProperties( JSON.stringify(data) );
            });
        });
        

        var engine = new Engine({"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":1277728,"index.wasm":35749181},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4});
        engine.startGame({
            canvas: canvas,                    
            canvasResizePolicy: 0,             
        }).then(() => {
            console.log("Engine loaded successfully!");

            resizeCanvas();

            window.addEventListener('resize', resizeCanvas);
        });

        function resizeCanvas() {
            const container = document.getElementById("canvas-container");

            const aspect = 16 / 9;

            let width = container.clientWidth;
            let height = container.clientHeight;

            if (height === 0) return; // evita glitch inicial

            if (width / height > aspect) {
                width = height * aspect;
            } else {
                height = width / aspect;
            }

            canvas.width = width;
            canvas.height = height;

            canvas.style.width = width + "px";
            canvas.style.height = height + "px";
        }
        
        
    </script>
</body>
</html>
